<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כאן 11 - שידור חי</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* ביטול שוליים ובחירת צבע רקע */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden; /* מונע פסי גלילה */
        }

        /* הגדרת הוידאו כך שיתפרס על כל החלון */
        #video {
            width: 100vw;
            height: 100vh;
            display: block;
            object-fit: contain; /* שומר על יחס גובה-רוחב כדי למנוע מתיחה של התמונה */
        }
    </style>
</head>
<body>

    <video id="video" controls autoplay></video>

    <script type="text/javascript">
        var video = document.getElementById('video');
        // הכתובת שחולצה מקובץ המקור
        var m3u8Url = 'https://kancdn.medonecdn.net/livehls/oil/kancdn-live/live/kan11/live.livx/playlist.m3u8?renditions&fmp4';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // תמיכה ב-Safari (Desktop ו-iOS)
            video.src = m3u8Url;
            video.addEventListener('canplay', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
