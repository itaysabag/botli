<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotLi Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --taskbar-height: 58px;
      --glass: rgba(20, 25, 34, 0.58);
      --glass-strong: rgba(16, 20, 28, 0.78);
      --panel: rgba(255, 255, 255, 0.82);
      --panel-border: rgba(255, 255, 255, 0.32);
      --win-bg: rgba(250, 252, 255, 0.88);
      --win-border: rgba(255,255,255,0.38);
      --text: #0f172a;
      --text-soft: #64748b;
      --accent: #38bdf8;
      --shadow: 0 12px 40px rgba(0,0,0,0.22);
      --shadow-soft: 0 8px 22px rgba(0,0,0,0.14);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --transition: 160ms ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Assistant', sans-serif;
      user-select: none;
    }

    body {
      background:
        radial-gradient(circle at 18% 18%, rgba(76, 194, 255, 0.24), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(120, 119, 255, 0.15), transparent 26%),
        linear-gradient(135deg, #0c1324 0%, #10203d 38%, #12345a 70%, #11466b 100%);
      color: white;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(255,255,255,0.05), transparent 26%, transparent 74%, rgba(255,255,255,0.03));
      pointer-events: none;
    }

    #desktop {
      position: absolute;
      inset: 0 0 var(--taskbar-height) 0;
      padding: 20px 18px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 96px);
      grid-template-rows: repeat(auto-fill, 108px);
      grid-auto-flow: column;
      gap: 10px;
      align-content: start;
      z-index: 1;
    }

    .shortcut {
      width: 88px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      text-align: center;
      position: relative;
    }

    .shortcut:hover {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }

    .shortcut.selected {
      background: rgba(255,255,255,0.16);
      outline: 1px solid rgba(255,255,255,0.18);
    }

    .shortcut:active {
      transform: scale(.98);
    }

    .shortcut-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 22px;
      color: white;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .shortcut span {
      font-size: 13px;
      line-height: 1.15;
      max-width: 82px;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }

    .taskbar {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 24px);
      height: calc(var(--taskbar-height) - 8px);
      border-radius: 18px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      overflow: hidden;
    }

    .taskbar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
      pointer-events: none;
    }

    .taskbar-center {
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 1;
    }

    .taskbar-right {
      position: absolute;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 1;
    }

    .start-btn,
    .taskbar-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: background var(--transition);
    }

    .start-btn:hover,
    .taskbar-icon:hover {
      background: rgba(255,255,255,0.12);
    }

    .taskbar-icon.active::after,
    .start-btn.active::after {
      content: "";
      position: absolute;
      bottom: 4px;
      width: 16px;
      height: 3px;
      border-radius: 999px;
      background: #8bdcff;
    }

    .start-logo {
      width: 22px;
      height: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }

    .start-logo div {
      background: linear-gradient(180deg, #8edcff, #38a9ff);
      border-radius: 2px;
    }

    .clock-pill {
      height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      transition: background var(--transition);
    }

    .clock-pill:hover {
      background: rgba(255,255,255,0.14);
    }

    .clock-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.1;
    }

    .clock-time {
      font-size: 14px;
      font-weight: 800;
    }

    .clock-date {
      font-size: 12px;
      opacity: .8;
    }

    .panel {
      position: fixed;
      bottom: 74px;
      background: rgba(20, 24, 31, 0.74);
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px) saturate(150%);
      -webkit-backdrop-filter: blur(28px) saturate(150%);
      opacity: 0;
      transform: translateY(12px) scale(.98);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 1900;
      overflow: hidden;
    }

    .panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .start-menu {
      width: 520px;
      left: 50%;
      transform: translateX(-50%) translateY(12px) scale(.98);
      padding: 18px;
    }

    .start-menu.open {
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .search-box {
      height: 50px;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      color: rgba(255,255,255,0.92);
      margin-bottom: 16px;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font: inherit;
      font-size: 15px;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .section-title {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin: 10px 4px 12px;
      font-weight: 700;
    }

    .pinned-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .pinned-app {
      height: 88px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      text-align: center;
      padding: 8px;
    }

    .pinned-app:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-2px);
    }

    .pinned-app-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: white;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.28);
    }

    .pinned-app span {
      font-size: 13px;
      font-weight: 700;
    }

    .start-footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .user-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #3498ff, #6c63ff);
    }

    .window {
      position: absolute;
      min-width: 360px;
      min-height: 240px;
      width: 780px;
      height: 520px;
      top: 74px;
      left: 140px;
      background: var(--win-bg);
      color: var(--text);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--win-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(145%);
      -webkit-backdrop-filter: blur(20px) saturate(145%);
      display: flex;
      flex-direction: column;
      z-index: 20;
      animation: openWin .16s ease-out;
    }

    .window.minimized {
      display: none;
    }

    .window.maximized {
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: calc(100vh - var(--taskbar-height) + 8px) !important;
      border-radius: 0;
    }

    @keyframes openWin {
      from { transform: scale(.97); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .window-header {
      height: 46px;
      background: rgba(255,255,255,0.68);
      display: flex;
      align-items: center;
      padding: 0 10px 0 12px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      flex-shrink: 0;
      cursor: move;
    }

    .window-title {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      pointer-events: none;
    }

    .window-title .title-icon {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 12px;
    }

    .window-title span {
      font-size: 14px;
      font-weight: 700;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .window-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-right: auto;
    }

    .win-btn {
      width: 42px;
      height: 32px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #1f2937;
      transition: background var(--transition), color var(--transition);
      font-size: 15px;
    }

    .win-btn:hover {
      background: rgba(16,24,40,0.08);
    }

    .win-btn.close:hover {
      background: #e81123;
      color: white;
    }

    .window-body {
      flex: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(247,250,255,0.92));
      overflow: auto;
    }

    .window-content {
      height: 100%;
    }

    .resize-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      left: 0;
      bottom: 0;
      cursor: nwse-resize;
      z-index: 5;
      background:
        linear-gradient(135deg, transparent 0 50%, rgba(0,0,0,0.12) 50% 60%, transparent 60% 70%, rgba(0,0,0,0.18) 70% 80%, transparent 80%);
    }

    .snap-indicator {
      position: fixed;
      inset: 12px;
      border-radius: 20px;
      background: rgba(125, 206, 255, 0.12);
      border: 2px solid rgba(125, 206, 255, 0.26);
      display: none;
      pointer-events: none;
      z-index: 1800;
    }

    .snap-indicator.show {
      display: block;
    }

    .overlay-dim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 1500;
      display: none;
    }

    .overlay-dim.show {
      display: block;
    }

    .hero {
      background: linear-gradient(135deg, rgba(56,189,248,0.14), rgba(99,102,241,0.08));
      border: 1px solid rgba(56,189,248,0.14);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-soft);
    }

    .hero h2 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .hero p {
      color: #475569;
      line-height: 1.5;
      max-width: 720px;
    }

    .content-area {
      padding: 18px;
      overflow: auto;
      height: 100%;
      background: linear-gradient(180deg, #ffffff, #f7faff);
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .mini-card {
      background: white;
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .mini-card h3 {
      margin-bottom: 8px;
      font-size: 18px;
      color: #0f172a;
    }

    .mini-card p {
      color: #64748b;
      line-height: 1.45;
      font-size: 14px;
    }

    .notes-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .notes-toolbar {
      height: 54px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-bottom: 1px solid rgba(15,23,42,0.08);
      background: rgba(255,255,255,.66);
    }

    .tool-btn {
      height: 34px;
      min-width: 34px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(15,23,42,0.08);
      background: rgba(255,255,255,0.78);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 700;
      color: #334155;
    }

    .notes-area {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 18px;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(255,255,255,0.95)),
        repeating-linear-gradient(to bottom, transparent 0 30px, rgba(15,23,42,0.05) 30px 31px);
      font: 16px/31px 'Assistant', sans-serif;
      color: #0f172a;
    }

    .welcome-wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .welcome-topbar {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(15,23,42,0.08);
      background: rgba(255,255,255,0.68);
    }

    .welcome-main {
      padding: 22px;
      overflow: auto;
      flex: 1;
      background: linear-gradient(180deg, #ffffff, #f7faff);
    }

    .welcome-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .welcome-item {
      background: white;
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .welcome-item strong {
      color: #0f172a;
    }

    .welcome-item small {
      color: #64748b;
    }

    @media (max-width: 900px) {
      .start-menu {
        width: calc(100% - 24px);
      }
    }
  </style>
</head>
<body>
  <div id="desktop"></div>
  <div class="snap-indicator" id="snapIndicator"></div>
  <div class="overlay-dim" id="overlayDim"></div>

  <div class="panel start-menu" id="startMenu">
    <div class="search-box">
      <span>🔎</span>
      <input id="startSearch" type="text" placeholder="חפש אפליקציה או קיצור דרך" />
    </div>

    <div class="section-title">יישומים וקיצורים</div>
    <div class="pinned-grid" id="pinnedGrid"></div>

    <div class="start-footer">
      <div class="user-box">
        <div class="avatar">א</div>
        <div>
          <div style="font-weight:800;">Itay</div>
          <div style="font-size:13px; opacity:.75;">BotLi Workspace</div>
        </div>
      </div>
      <div style="font-size:13px; opacity:.72;">סביבת עבודה אחידה לתלמידים</div>
    </div>
  </div>

  <div class="taskbar">
    <div class="taskbar-center">
      <div class="start-btn" id="startBtn" title="Start">
        <div class="start-logo">
          <div></div><div></div><div></div><div></div>
        </div>
      </div>
      <div id="taskbarApps" style="display:flex; align-items:center; gap:6px;"></div>
    </div>

    <div class="taskbar-right">
      <div class="clock-pill" id="clockBtn">
        <div class="clock-block">
          <div class="clock-time" id="clockTime">12:00</div>
          <div class="clock-date" id="clockDate">01/01/2026</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const desktop = document.getElementById('desktop');
    const taskbarApps = document.getElementById('taskbarApps');
    const startMenu = document.getElementById('startMenu');
    const startBtn = document.getElementById('startBtn');
    const overlayDim = document.getElementById('overlayDim');
    const snapIndicator = document.getElementById('snapIndicator');

    let topZ = 50;
    let windowCount = 0;

    const externalApps = [
      {
        id: 'drive',
        name: 'סייר הקבצים',
        icon: '📁',
        color: 'linear-gradient(135deg,#f6c453,#f59e0b)',
        url: 'https://drive.google.com'
      },
      {
        id: 'gmail',
        name: 'Gmail',
        icon: '✉️',
        color: 'linear-gradient(135deg,#ea4335,#c5221f)',
        url: 'https://mail.google.com'
      },
      {
        id: 'gemini',
        name: 'Gemini',
        icon: '✦',
        color: 'linear-gradient(135deg,#4f46e5,#06b6d4)',
        url: 'https://gemini.google.com'
      },
      {
        id: 'chatgpt',
        name: 'ChatGPT',
        icon: '◎',
        color: 'linear-gradient(135deg,#10a37f,#0f766e)',
        url: 'https://chatgpt.com'
      },
      {
        id: 'botlimudim',
        name: 'Botlimudim',
        icon: '🖥️',
        color: 'linear-gradient(135deg,#0ea5e9,#2563eb)',
        url: 'https://botlimudim.co.il'
      }
    ];

    const internalApps = [
      {
        id: 'home',
        name: 'דף הבית',
        icon: '🏠',
        color: 'linear-gradient(135deg,#38bdf8,#2563eb)'
      },
      {
        id: 'notes',
        name: 'Notes',
        icon: '📝',
        color: 'linear-gradient(135deg,#34d399,#10b981)'
      }
    ];

    const allApps = [...externalApps, ...internalApps];

    function appById(id) {
      return allApps.find(a => a.id === id);
    }

    function initDesktop() {
      desktop.innerHTML = '';
      allApps.forEach(app => {
        const shortcut = document.createElement('div');
        shortcut.className = 'shortcut';
        shortcut.dataset.app = app.id;
        shortcut.innerHTML = `
          <div class="shortcut-icon" style="background:${app.color}">
            <span>${app.icon}</span>
          </div>
          <span>${app.name}</span>
        `;

        shortcut.addEventListener('click', (e) => {
          clearShortcutSelection();
          shortcut.classList.add('selected');
          e.stopPropagation();
        });

        shortcut.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          launchApp(app.id);
        });

        desktop.appendChild(shortcut);
      });

      renderPinnedApps();
    }

    function renderPinnedApps(filter = '') {
      const grid = document.getElementById('pinnedGrid');
      const q = filter.trim().toLowerCase();
      const filtered = allApps.filter(a =>
        a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q)
      );

      grid.innerHTML = filtered.map(app => `
        <div class="pinned-app" onclick="launchApp('${app.id}')">
          <div class="pinned-app-icon" style="background:${app.color}">${app.icon}</div>
          <span>${app.name}</span>
        </div>
      `).join('');
    }

    function launchApp(id) {
      closeStartMenu();

      const app = appById(id);
      if (!app) return;

      if (app.url) {
        window.open(app.url, '_blank');
        return;
      }

      const existing = document.getElementById(`win-${id}`);
      if (existing) {
        if (existing.classList.contains('minimized')) {
          existing.classList.remove('minimized');
        }
        focusWindow(id);
        return;
      }

      createInternalWindow(app);
    }

    function createInternalWindow(app) {
      const win = document.createElement('div');
      const offset = windowCount * 26;
      windowCount++;

      win.className = 'window';
      win.id = `win-${app.id}`;
      win.dataset.app = app.id;
      win.dataset.prev = '';
      win.style.top = `${74 + (offset % 120)}px`;
      win.style.left = `${120 + (offset % 180)}px`;
      win.style.zIndex = ++topZ;

      if (app.id === 'notes') {
        win.style.width = '760px';
        win.style.height = '520px';
      }

      if (app.id === 'home') {
        win.style.width = '820px';
        win.style.height = '540px';
      }

      win.innerHTML = `
        <div class="window-header">
          <div class="window-title">
            <div class="title-icon" style="background:${app.color}">${app.icon}</div>
            <span>${app.name}</span>
          </div>

          <div class="window-controls">
            <div class="win-btn" data-action="minimize">─</div>
            <div class="win-btn" data-action="maximize">▢</div>
            <div class="win-btn close" data-action="close">✕</div>
          </div>
        </div>

        <div class="window-body">
          <div class="window-content">${getAppContent(app.id)}</div>
        </div>

        <div class="resize-handle"></div>
      `;

      document.body.appendChild(win);
      bindWindowEvents(win);
      addTaskbarIcon(app);
      focusWindow(app.id);
    }

    function addTaskbarIcon(app) {
      if (document.getElementById(`task-${app.id}`)) return;

      const icon = document.createElement('div');
      icon.className = 'taskbar-icon active';
      icon.id = `task-${app.id}`;
      icon.title = app.name;
      icon.innerHTML = `
        <div style="
          width:30px;
          height:30px;
          border-radius:10px;
          display:grid;
          place-items:center;
          background:${app.color};
          color:white;
          font-size:15px;
        ">${app.icon}</div>
      `;

      icon.addEventListener('click', () => toggleTaskWindow(app.id));
      taskbarApps.appendChild(icon);
    }

    function toggleTaskWindow(id) {
      const win = document.getElementById(`win-${id}`);
      if (!win) {
        launchApp(id);
        return;
      }

      if (win.classList.contains('minimized')) {
        win.classList.remove('minimized');
        focusWindow(id);
      } else if (win.classList.contains('focused')) {
        minimizeWindow(id);
      } else {
        focusWindow(id);
      }
    }

    function bindWindowEvents(win) {
      const header = win.querySelector('.window-header');
      const resizeHandle = win.querySelector('.resize-handle');
      const id = win.dataset.app;

      win.querySelectorAll('.win-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const action = btn.dataset.action;
          if (action === 'close') closeWindow(id);
          if (action === 'minimize') minimizeWindow(id);
          if (action === 'maximize') toggleMaximize(id);
        });
      });

      win.addEventListener('mousedown', () => focusWindow(id));

      header.addEventListener('mousedown', (e) => {
        if (e.target.closest('.win-btn')) return;
        startDrag(win, e);
      });

      resizeHandle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        startResize(win, e);
      });
    }

    function focusWindow(id) {
      document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
      document.querySelectorAll('.taskbar-icon').forEach(i => i.classList.remove('active'));

      const win = document.getElementById(`win-${id}`);
      if (!win) return;

      win.classList.add('focused');
      win.style.zIndex = ++topZ;

      const task = document.getElementById(`task-${id}`);
      if (task) task.classList.add('active');
    }

    function minimizeWindow(id) {
      const win = document.getElementById(`win-${id}`);
      if (!win) return;
      win.classList.add('minimized');

      const task = document.getElementById(`task-${id}`);
      if (task) task.classList.remove('active');
    }

    function closeWindow(id) {
      const win = document.getElementById(`win-${id}`);
      const task = document.getElementById(`task-${id}`);
      if (win) win.remove();
      if (task) task.remove();
    }

    function toggleMaximize(id) {
      const win = document.getElementById(`win-${id}`);
      if (!win) return;

      if (win.classList.contains('maximized')) {
        restoreWindow(win);
      } else {
        saveWindowRect(win);
        win.classList.add('maximized');
      }

      focusWindow(id);
    }

    function saveWindowRect(win) {
      const rect = {
        top: win.style.top,
        left: win.style.left,
        width: win.style.width,
        height: win.style.height
      };
      win.dataset.prev = JSON.stringify(rect);
    }

    function restoreWindow(win) {
      const prev = win.dataset.prev ? JSON.parse(win.dataset.prev) : null;
      win.classList.remove('maximized');

      if (prev) {
        win.style.top = prev.top;
        win.style.left = prev.left;
        win.style.width = prev.width;
        win.style.height = prev.height;
      }
    }

    function startDrag(win, e) {
      focusWindow(win.dataset.app);

      if (win.classList.contains('maximized')) {
        restoreWindow(win);
        const rect = win.getBoundingClientRect();
        win.style.left = `${Math.max(0, e.clientX - rect.width / 2)}px`;
        win.style.top = `10px`;
      }

      const startX = e.clientX;
      const startY = e.clientY;
      const rect = win.getBoundingClientRect();
      const initialLeft = rect.left;
      const initialTop = rect.top;

      let snapMode = null;

      function onMove(ev) {
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;

        win.style.left = `${Math.max(0, Math.min(window.innerWidth - 220, initialLeft + dx))}px`;
        win.style.top = `${Math.max(0, Math.min(window.innerHeight - 110, initialTop + dy))}px`;

        snapMode = null;
        snapIndicator.classList.remove('show');
        snapIndicator.style.inset = '12px';

        if (ev.clientY <= 12) {
          snapMode = 'max';
          snapIndicator.classList.add('show');
          snapIndicator.style.inset = '12px';
        } else if (ev.clientX <= 16) {
          snapMode = 'left';
          snapIndicator.classList.add('show');
          snapIndicator.style.top = '12px';
          snapIndicator.style.bottom = '66px';
          snapIndicator.style.left = '12px';
          snapIndicator.style.right = `${window.innerWidth / 2 + 6}px`;
        } else if (ev.clientX >= window.innerWidth - 16) {
          snapMode = 'right';
          snapIndicator.classList.add('show');
          snapIndicator.style.top = '12px';
          snapIndicator.style.bottom = '66px';
          snapIndicator.style.left = `${window.innerWidth / 2 + 6}px`;
          snapIndicator.style.right = '12px';
        }
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        snapIndicator.classList.remove('show');

        if (snapMode === 'max') {
          saveWindowRect(win);
          win.classList.add('maximized');
        } else if (snapMode === 'left') {
          saveWindowRect(win);
          win.classList.remove('maximized');
          win.style.top = '0px';
          win.style.left = '0px';
          win.style.width = `${window.innerWidth / 2}px`;
          win.style.height = `${window.innerHeight - 50}px`;
        } else if (snapMode === 'right') {
          saveWindowRect(win);
          win.classList.remove('maximized');
          win.style.top = '0px';
          win.style.left = `${window.innerWidth / 2}px`;
          win.style.width = `${window.innerWidth / 2}px`;
          win.style.height = `${window.innerHeight - 50}px`;
        }
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function startResize(win, e) {
      focusWindow(win.dataset.app);

      if (win.classList.contains('maximized')) return;

      const startX = e.clientX;
      const startY = e.clientY;
      const startWidth = win.offsetWidth;
      const startHeight = win.offsetHeight;

      function onMove(ev) {
        const width = Math.max(360, startWidth + (ev.clientX - startX));
        const height = Math.max(240, startHeight + (ev.clientY - startY));
        win.style.width = `${Math.min(width, window.innerWidth - 20)}px`;
        win.style.height = `${Math.min(height, window.innerHeight - 80)}px`;
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function toggleStartMenu() {
      const isOpen = startMenu.classList.contains('open');
      closeStartMenu();

      if (!isOpen) {
        startMenu.classList.add('open');
        overlayDim.classList.add('show');
        startBtn.classList.add('active');
        document.getElementById('startSearch').focus();
      }
    }

    function closeStartMenu() {
      startMenu.classList.remove('open');
      overlayDim.classList.remove('show');
      startBtn.classList.remove('active');
    }

    startBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleStartMenu();
    });

    overlayDim.addEventListener('click', closeStartMenu);

    desktop.addEventListener('click', () => {
      clearShortcutSelection();
      closeStartMenu();
    });

    function clearShortcutSelection() {
      document.querySelectorAll('.shortcut.selected').forEach(el => el.classList.remove('selected'));
    }

    document.getElementById('startSearch').addEventListener('input', (e) => {
      renderPinnedApps(e.target.value);
    });

    function updateClock() {
      const now = new Date();
      document.getElementById('clockTime').textContent =
        now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clockDate').textContent =
        now.toLocaleDateString('he-IL');
    }

    setInterval(updateClock, 1000);
    updateClock();

    function getAppContent(id) {
      if (id === 'home') {
        return `
          <div class="welcome-wrap">
            <div class="welcome-topbar">
              <div style="font-weight:800; color:#0f172a;">BotLi Workspace</div>
              <div style="font-size:13px; color:#64748b;">סביבת עבודה לתלמידים</div>
            </div>

            <div class="welcome-main">
              <div class="hero">
                <h2>ברוכים הבאים</h2>
                <p>
                  זהו דסקטופ עבודה נקי ואחיד שנועד לתת לתלמידים גישה מהירה לכלים המרכזיים:
                  Google Drive, Gmail, Gemini, ChatGPT ו-Botlimudim.
                </p>
              </div>

              <div class="grid-cards">
                <div class="mini-card">
                  <h3>גישה מהירה</h3>
                  <p>כל השירותים החשובים נמצאים על שולחן העבודה ובתפריט ההתחל.</p>
                </div>

                <div class="mini-card">
                  <h3>חוויה אחידה</h3>
                  <p>לא משנה מאיזה מחשב התלמיד נכנס, סביבת העבודה נשארת ברורה ומוכרת.</p>
                </div>

                <div class="mini-card">
                  <h3>פשוט ונקי</h3>
                  <p>ללא עומס מיותר, רק הדברים שבאמת צריך.</p>
                </div>
              </div>

              <div class="welcome-list">
                <div class="welcome-item">
                  <div>
                    <strong>Google Drive</strong><br>
                    <small>גישה לקבצים ותיקיות</small>
                  </div>
                  <span>📁</span>
                </div>

                <div class="welcome-item">
                  <div>
                    <strong>Gmail</strong><br>
                    <small>דוא"ל תלמידים</small>
                  </div>
                  <span>✉️</span>
                </div>

                <div class="welcome-item">
                  <div>
                    <strong>Botlimudim</strong><br>
                    <small>האתר המרכזי ללמידה</small>
                  </div>
                  <span>🖥️</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      if (id === 'notes') {
        return `
          <div class="notes-wrap">
            <div class="notes-toolbar">
              <div class="tool-btn">שמור</div>
            </div>
            <textarea class="notes-area">הערות אישיות או טיוטות עבודה של התלמיד.</textarea>
          </div>
        `;
      }

      return '';
    }

    window.launchApp = launchApp;
    initDesktop();
  </script>
</body>
