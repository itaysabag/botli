<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotLi Desktop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --taskbar-bg: rgba(0, 0, 0, 0.6);
            --text-color: #ffffff;
            --accent-color: #00a2ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
        }

        /* שולחן העבודה - סידור האייקונים */
        .desktop-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(110px, 1fr));
            grid-auto-flow: column; /* סידור כמו בווינדוס מצד לצד או מלמעלה למטה */
            gap: 15px;
            height: calc(100vh - 60px);
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: white;
            text-align: center;
            border: 1px solid transparent;
        }

        .shortcut:hover {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .shortcut i {
            font-size: 2.5rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .shortcut span {
            font-size: 0.85rem;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* שורת המשימות (Taskbar) */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .start-menu-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--accent-color);
        }

        .start-menu-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .taskbar-divider {
            width: 1px;
            height: 25px;
            background: rgba(255,255,255,0.2);
            margin: 0 15px;
        }

        .running-apps {
            display: flex;
            gap: 10px;
            flex-grow: 1;
        }

        .system-tray {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85rem;
            padding: 0 10px;
        }

        #clock-container {
            text-align: center;
            line-height: 1.2;
        }

        /* אפקטים של Gmail ספציפי כדי שייראה טוב */
        .fa-envelope { color: #ea4335; } /* Gmail Red */
        .fa-code { color: #00f2fe; }     /* Java Blue */
        .fa-folder-open { color: #ffca28; } /* Folder Yellow */
    </style>
</head>
<body>

    <div class="desktop-container" id="desktop">
        </div>

    <nav class="taskbar">
        <div class="start-menu-btn">
            <i class="fas fa-th-large"></i>
        </div>
        <div class="taskbar-divider"></div>
        <div class="running-apps" id="taskbar-icons">
            </div>
        <div class="system-tray">
            <i class="fas fa-wifi"></i>
            <i class="fas fa-volume-up"></i>
            <div id="clock-container">
                <div id="time"></div>
                <div id="date" style="font-size: 0.7rem;"></div>
            </div>
        </div>
    </nav>

    <script>
        /**
         * הגדרת האפליקציות והקישורים שלך
         * path: יכול להיות קובץ מקומי (למשל index.html) או קישור מלא (http...)
         * icon: שם הקלאס מ-Font Awesome (חפש ב-fontawesome.com/icons)
         **/
        const myApps = [
            { name: "BotLi IDE", path: "editor.html", icon: "fas fa-code" },
            { name: "Gmail", path: "https://mail.google.com", icon: "fas fa-envelope" },
            { name: "מערכי שיעור", path: "lessons/math.html", icon: "fas fa-book-open" },
            { name: "GitHub Repo", path: "https://github.com/yourusername", icon: "fab fa-github" },
            { name: "Docs", path: "https://docs.google.com", icon: "fas fa-file-alt" },
            { name: "הגדרות", path: "settings.html", icon: "fas fa-cog" }
        ];

        function initDesktop() {
            const desktop = document.getElementById('desktop');
            
            myApps.forEach(app => {
                const shortcut = document.createElement('a');
                shortcut.className = 'shortcut';
                shortcut.href = app.path;

                // בדיקה אם זה קישור חיצוני (מתחיל ב-http)
                if (app.path.startsWith('http')) {
                    shortcut.target = "_blank"; // פתיחה בטאב חדש לקישורים חיצוניים
                }

                shortcut.innerHTML = `
                    <i class="${app.icon}"></i>
                    <span>${app.name}</span>
                `;

                desktop.appendChild(shortcut);
            });
        }

        // עדכון שעון ותאריך סטייל ווינדוס
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
            
            document.getElementById('time').textContent = timeStr;
            document.getElementById('date').textContent = dateStr;
        }

        // הפעלה
        initDesktop();
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
