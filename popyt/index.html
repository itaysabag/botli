<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Fullscreen Player</title>
    <style>
        /* ביטול שוליים וקיבוע הרקע */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
        }

        /* מתיחת ה-iframe על כל המסך */
        #player-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="player-container">
        <iframe 
            src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1&controls=0&rel=0&showinfo=0&iv_load_policy=3&modestbranding=1" 
            allow="autoplay; encrypted-media; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
