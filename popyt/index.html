<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Cinema Hub - Window Mode</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        input {
            width: 350px;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #000;
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: left;
            direction: ltr;
        }
        button {
            padding: 12px 25px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-top:0">Cinema Hub 🎬</h2>
        <input type="text" id="ytUrl" placeholder="הדבק לינק מיוטיוב...">
        <br>
        <button onclick="openCinemaPopup()">פתח בחלון נקי</button>
    </div>

    <script>
        function openCinemaPopup() {
            const urlValue = document.getElementById('ytUrl').value.trim();
            
            // חילוץ ה-ID של הסרטון
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = urlValue.match(regExp);
            const videoId = (match && match[2].length == 11) ? match[2] : null;

            if (videoId) {
                // שימוש בכתובת watch_popup כדי לעקוף חסימות הטמעה (Error 153)
                const popupUrl = `https://www.youtube.com/watch_popup?v=${videoId}`;
                
                // הגדרות החלון בדיוק לפי הדוגמה ששלחת
                const features = "width=1280,height=720,toolbar=no,menubar=no,location=no,status=no,scrollbars=no,resizable=yes";
                
                window.open(popupUrl, "_blank", features);
            } else {
                alert("אנא הזן לינק תקין של יוטיוב");
            }
        }
    </script>

</body>
</html>
