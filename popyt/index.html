<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז סינמה אישי</title>
    <style>
        /* הגדרות בסיס נקיות */
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1f1f1f;
            --accent: #e50914;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* ממשק המשתמש (לובי הסינמה) */
        #lobby {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #2a2a2a 0%, #000000 100%);
        }

        .control-panel {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        input {
            width: 90%;
            padding: 15px;
            margin: 20px 0;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: white;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }

        input:focus {
            outline: 2px solid var(--accent);
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #f40612;
        }

        /* מסך הקולנוע (מוסתר כברירת מחדל) */
        #cinema-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background-color: black;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* כפתור יציאה שמופיע רק בריחוף כדי לא להפריע */
        #exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        #cinema-screen:hover #exit-btn {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="control-panel">
            <h1>מרכז סינמה 🎬</h1>
            <p>הדבק קישור מיוטיוב לחווית צפייה נקייה לגמרי</p>
            <input type="text" id="youtube-link" placeholder="https://www.youtube.com/watch?v=...">
            <br>
            <button onclick="startCinemaMode()">הפעל מסך מלא</button>
        </div>
    </div>

    <div id="cinema-screen">
        <button id="exit-btn" onclick="exitCinemaMode()">סגור סרטון (או לחץ ESC)</button>
        <iframe id="video-player" allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        // פונקציית עזר לחילוץ מזהה הסרטון מתוך מגוון סוגי קישורים של יוטיוב
        function extractVideoID(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // הפעלת מצב סינמה
        function startCinemaMode() {
            const urlInput = document.getElementById('youtube-link').value;
            const videoId = extractVideoID(urlInput);

            if (!videoId) {
                alert("הקישור אינו תקין. אנא ודא שזהו קישור תקין של יוטיוב.");
                return;
            }

            const lobby = document.getElementById('lobby');
            const cinemaScreen = document.getElementById('cinema-screen');
            const player = document.getElementById('video-player');

            // בניית כתובת ההטמעה עם פרמטרים לניקוי הממשק
            const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&rel=0&modestbranding=1`;

            // הסתרת הלובי והצגת מסך הקולנוע
            lobby.style.display = 'none';
            cinemaScreen.style.display = 'block';
            player.src = embedUrl;

            // בקשה מהדפדפן לעבור למסך מלא אמיתי (מסתיר את שורת הכתובות וסרגלי הכלים)
            if (cinemaScreen.requestFullscreen) {
                cinemaScreen.requestFullscreen();
            } else if (cinemaScreen.webkitRequestFullscreen) { /* Safari */
                cinemaScreen.webkitRequestFullscreen();
            } else if (cinemaScreen.msRequestFullscreen) { /* IE11 */
                cinemaScreen.msRequestFullscreen();
            }
        }

        // יציאה ממצב סינמה
        function exitCinemaMode() {
            const lobby = document.getElementById('lobby');
            const cinemaScreen = document.getElementById('cinema-screen');
            const player = document.getElementById('video-player');

            // עצירת הסרטון על ידי איפוס ה-src
            player.src = "";

            // חזרה לתצוגת הלובי
            cinemaScreen.style.display = 'none';
            lobby.style.display = 'flex';

            // יציאה ממסך מלא ברמת הדפדפן
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        // האזנה לאירוע יציאה ממסך מלא (כדי לטפל במצב שבו המשתמש לחץ ESC)
        document.addEventListener('fullscreenchange', (event) => {
            if (!document.fullscreenElement) {
                exitCinemaMode();
            }
        });
    </script>

</body>
</html>
