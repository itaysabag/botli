<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>YouTube Link to Fullscreen</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            text-align: center;
            background: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input {
            padding: 12px;
            width: 350px;
            border: none;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>הדבק לינק יוטיוב להצגה נקייה</h2>
        <input type="text" id="videoUrl" placeholder="הדבק כאן את הלינק...">
        <br>
        <button onclick="launchVideo()">פתח סרטון נקי</button>
    </div>

    <script>
        function launchVideo() {
            const urlValue = document.getElementById('videoUrl').value;
            
            // חילוץ ה-ID של הסרטון
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = urlValue.match(regExp);
            const videoId = (match && match[2].length == 11) ? match[2] : null;

            if (videoId) {
                // יצירת תוכן ה-HTML לחלון החדש (דומה למבנה שנתת ב-ch11.html)
                const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&rel=0&modestbranding=1&iv_load_policy=3`;
                
                const newWindowHtml = `
                    <html>
                    <head>
                        <title>YouTube Player</title>
                        <style>
                            body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
                            iframe { width: 100vw; height: 100vh; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${embedUrl}" allow="autoplay; fullscreen"></iframe>
                    </body>
                    </html>
                `;

                // פתיחת חלון חדש ללא סרגלי כלים (כמו אפליקציה)
                const win = window.open("", "_blank", "toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes,width=1280,height=720");
                win.document.write(newWindowHtml);
                win.document.close();
            } else {
                alert("אנא הזן לינק תקין של יוטיוב");
            }
        }
    </script>

</body>
</html>
