<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>YouTube Fullscreen Bypass</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            text-align: center;
            background: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input {
            padding: 12px;
            width: 350px;
            border: none;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>הדבק לינק (גם לסרטונים חסומים)</h2>
        <input type="text" id="videoUrl" placeholder="הדבק כאן את הלינק...">
        <br>
        <button onclick="launchVideo()">פתח במצב נקי</button>
    </div>

    <script>
        function launchVideo() {
            const urlValue = document.getElementById('videoUrl').value;
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = urlValue.match(regExp);
            const videoId = (match && match[2].length == 11) ? match[2] : null;

            if (videoId) {
                // במקום EMBED, אנחנו משתמשים בכתובת של גרסת ה-TV או ה-Watch
                // זה עוקף את חסימת ההטמעה כי זה נחשב "צפייה ישירה" ביוטיוב
                const cleanUrl = `https://www.youtube.com/watch_popup?v=${videoId}`;
                
                // פתיחת חלון חדש ללא שוליים
                window.open(cleanUrl, "_blank", "toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes,width=" + screen.width + ",height=" + screen.height);
            } else {
                alert("אנא הזן לינק תקין");
            }
        }
    </script>

</body>
</html>
