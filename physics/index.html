<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פיזיקה זומר 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #131314;
            --bg-card: #1e1f20;
            --bg-button: #2d2e30;
            --text-main: #e3e3e3;
            --text-muted: #c4c7c5;
            --accent-blue: #a8c7fa;
            --accent-red: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Rubik', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border-top: 4px solid var(--accent-red);
            margin: 20px 0;
        }

        h1 {
            text-align: center;
            color: var(--accent-blue);
            margin-bottom: 30px;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        /* עיצוב אזור הזום */
        .zoom-container {
            margin-bottom: 40px;
        }

        button.zoom-toggle {
            width: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--accent-blue);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            font-family: 'Rubik', sans-serif;
        }

        button.zoom-toggle:hover {
            background-color: var(--accent-blue);
            color: var(--bg-main);
        }

        .zoom-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
            background-color: var(--bg-main);
            border-radius: 0 0 8px 8px;
            padding: 0 20px;
            margin-top: -5px;
            border: 1px solid transparent;
            border-top: none;
        }

        .zoom-dropdown.open {
            max-height: 250px;
            padding: 15px 20px;
            border-color: var(--bg-button);
        }

        .zoom-dropdown p {
            margin: 10px 0;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .zoom-dropdown a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .zoom-dropdown a:hover {
            text-decoration: underline;
        }

        /* עיצוב השכבות והכפתורים הרגילים */
        .grade-section {
            margin-bottom: 30px;
        }

        .grade-section:last-child {
            margin-bottom: 0;
        }

        h2 {
            color: var(--text-main);
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--bg-button);
            padding-bottom: 10px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        a.link-button {
            display: block;
            background-color: var(--bg-button);
            color: var(--accent-blue);
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        a.link-button:hover {
            background-color: var(--accent-blue);
            color: var(--bg-main);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(168, 199, 250, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>פיזיקה זומר 2026</h1>

        <div class="zoom-container">
            <button class="zoom-toggle" onclick="toggleZoom()">
                <span>📹 התחברות לשיעור זום</span>
                <span id="zoom-arrow">▼</span>
            </button>
            <div class="zoom-dropdown" id="zoom-dropdown">
                <p><strong>קישור לזום:</strong> <a href="https://edu-il.zoom.us/j/83123957958?pwd=JvBDCKvcEFPU5tyODdw5mKUY6UQbLL.1" target="_blank">לחץ כאן לכניסה</a></p>
                <p><strong>Meeting ID:</strong> 831 2395 7958</p>
                <p><strong>Passcode:</strong> abc123</p>
            </div>
        </div>

        <div class="grade-section">
            <h2>י"א</h2>
            <div class="button-grid">
                <a href="https://docs.google.com/document/d/1-mOYQ0G0EHQIj0fb_pCb74vT6CDmRwvUkGObd35EKhk/edit?tab=t.0" target="_blank" class="link-button">כבידה</a>
                <a href="https://docs.google.com/document/d/1Q6mj_tzfOTkT7sIeJk7ElvD2HQk1_nqngI5bCJcV5Jo/edit?usp=sharing" target="_blank" class="link-button">עבודת הגשה פסח</a>
            </div>
        </div>

        <div class="grade-section">
            <h2>י"ב</h2>
            <div class="button-grid">
                <a href="https://docs.google.com/document/d/1azBis98LO6Rujk8AvP4VaSd-4R1Z6_LyXgWwhWh5JvY/edit?tab=t.0" target="_blank" class="link-button">חשמל</a>
                <a href="https://docs.google.com/document/d/1oN6gEj5bUxsQh1AvfOUNqY3tl_xFcNHnOT4aFiw8THw/preview" target="_blank" class="link-button">מעבדת חקר (יעודכן)</a>
            </div>
        </div>
    </div>

    <script>
        function toggleZoom() {
            const dropdown = document.getElementById("zoom-dropdown");
            const arrow = document.getElementById("zoom-arrow");
            
            if (dropdown.classList.contains("open")) {
                dropdown.classList.remove("open");
                arrow.textContent = "▼";
            } else {
                dropdown.classList.add("open");
                arrow.textContent = "▲";
            }
        }
    </script>
</body>
</html>
