function updateScores(){
for(let i=0;i<3;i++)
document.getElementById("team"+i).innerText="Team "+(i+1)+": "+scores[i];
}


function getQuestion(cat,diff){

let list=questions[cat][diff];
if(list.length===0)return null;

let index=Math.floor(Math.random()*list.length);
return list.splice(index,1)[0];
}



function createBoard(){

const board=document.getElementById("board");

categories.forEach(cat=>{
let div=document.createElement("div");
div.className="category";
div.innerText=cat;
board.appendChild(div);
});

for(let row=0;row<5;row++){

let value=(row+1)*100;

for(let col=0;col<5;col++){

let tile=document.createElement("div");
tile.className="tile";
tile.innerText="$"+value;

let cat=categories[col];
let diff=row;

tile.onclick=function(){

if(tile.classList.contains("used"))return;

let q=getQuestion(cat,diff);

if(!q){
alert("No more questions");
return;
}

let guess=prompt(q.q);

if(guess===null)return;

guess=guess.toLowerCase();

let team=prompt("Which team answered? (1-3)");

team=parseInt(team)-1;

if(guess.includes(q.a)){
scores[team]+=value;
alert("Correct!");
}
else{
alert("Wrong! Answer: "+q.a);
}

updateScores();

tile.classList.add("used");
tile.innerText="";

};

board.appendChild(tile);

}

}

}


createBoard();
