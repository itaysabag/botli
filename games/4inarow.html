<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתגר בשורה - משימה כיתתית</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2d3436;
            color: #dfe6e9;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #74b9ff;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #b2bec3;
        }

        #game-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .turn-indicator {
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .active-red {
            background-color: #d63031;
            color: white;
            box-shadow: 0 0 15px rgba(214, 48, 49, 0.6);
        }

        .active-yellow {
            background-color: #fbc531;
            color: #2d3436;
            box-shadow: 0 0 15px rgba(251, 197, 49, 0.6);
        }

        .active-green {
            background-color: #00b894;
            color: white;
            box-shadow: 0 0 15px rgba(0, 184, 148, 0.6);
        }

        .inactive {
            background-color: #636e72;
            color: #b2bec3;
            opacity: 0.5;
        }

        #board-container {
            display: inline-block;
            background-color: #0984e3;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .col-btn {
            width: 60px;
            height: 40px;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #74b9ff;
            color: #2d3436;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .col-btn:hover { background-color: #dfe6e9; }
        .col-btn:active { transform: scale(0.95); }

        .board {
            display: grid;
            grid-template-columns: repeat(7, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 10px;
        }

        .cell {
            width: 60px;
            height: 60px;
            background-color: #2d3436;
            border-radius: 50%;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .token {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            animation: dropIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3), inset 0 -3px 6px rgba(0,0,0,0.2);
        }

        .token.red { background-color: #d63031; }
        .token.yellow { background-color: #fbc531; }
        .token.green { background-color: #00b894; }

        @keyframes dropIn {
            0% { transform: translateY(-300px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulseWin {
            0% { transform: scale(1); box-shadow: 0 0 10px white; }
            50% { transform: scale(1.1); box-shadow: 0 0 25px white; }
            100% { transform: scale(1); box-shadow: 0 0 10px white; }
        }

        .winning-cell .token {
            animation: pulseWin 1s infinite;
            border: 3px solid white;
        }

        #message-area {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
            min-height: 50px;
        }

        .control-panel {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .mode-btn {
            padding: 12px 20px;
            font-size: 1.1rem;
            color: white;
            border: 2px solid #74b9ff;
            background-color: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .mode-btn:hover {
            background-color: #74b9ff;
            color: #2d3436;
        }

    </style>
</head>
<body>

    <h1 id="main-title">4 בשורה - משימה כיתתית</h1>
    <div class="subtitle">המורה לוחץ על העמודה שהקבוצה בוחרת. צרו רצף כדי לנצח!</div>

    <div id="game-info">
        <div id="team1" class="turn-indicator active-red">קבוצה א' (אדום)</div>
        <div id="team2" class="turn-indicator inactive">קבוצה ב' (צהוב)</div>
        <div id="team3" class="turn-indicator inactive" style="display: none;">קבוצה ג' (ירוק)</div>
    </div>

    <div id="board-container">
        <div class="controls-row" id="controls">
            <button class="col-btn" onclick="dropToken(0)">1</button>
            <button class="col-btn" onclick="dropToken(1)">2</button>
            <button class="col-btn" onclick="dropToken(2)">3</button>
            <button class="col-btn" onclick="dropToken(3)">4</button>
            <button class="col-btn" onclick="dropToken(4)">5</button>
            <button class="col-btn" onclick="dropToken(5)">6</button>
            <button class="col-btn" onclick="dropToken(6)">7</button>
        </div>
        
        <div class="board" id="board"></div>
    </div>

    <div id="message-area"></div>

    <div class="control-panel">
        <button class="mode-btn" onclick="setMode(4, 2)">שחק 4 בשורה (2 קבוצות)</button>
        <button class="mode-btn" onclick="setMode(3, 3)">שחק 3 בשורה (3 קבוצות)</button>
    </div>

    <script>
        const ROWS = 6;
        const COLS = 7;
        let boardArr = [];
        let currentPlayer = 1; 
        let gameActive = true;
        
        // הגדרות המשחק (ברירת מחדל: 4 בשורה, 2 קבוצות)
        let winCondition = 4;
        let totalTeams = 2;

        const boardElement = document.getElementById('board');
        const messageArea = document.getElementById('message-area');
        const team1Indicator = document.getElementById('team1');
        const team2Indicator = document.getElementById('team2');
        const team3Indicator = document.getElementById('team3');
        const controls = document.getElementById('controls');
        const mainTitle = document.getElementById('main-title');

        // החלפת מצב משחק
        function setMode(targetWin, targetTeams) {
            winCondition = targetWin;
            totalTeams = targetTeams;
            mainTitle.innerText = `${targetWin} בשורה - משימה כיתתית`;
            
            // הצגה או הסתרה של קבוצה ג'
            team3Indicator.style.display = totalTeams === 3 ? "block" : "none";
            
            initGame();
        }

        // אתחול המשחק
        function initGame() {
            boardArr = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            currentPlayer = 1;
            gameActive = true;
            messageArea.innerText = "";
            
            updateTurnIndicators();
            enableControls(true);
            renderBoard();
        }

        function renderBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.id = `cell-${r}-${c}`;
                    boardElement.appendChild(cell);
                }
            }
        }

        function dropToken(col) {
            if (!gameActive) return;

            for (let r = ROWS - 1; r >= 0; r--) {
                if (boardArr[r][col] === 0) {
                    boardArr[r][col] = currentPlayer;
                    animateTokenDrop(r, col, currentPlayer);
                    
                    setTimeout(() => {
                        if (checkWin(r, col)) {
                            handleWin();
                        } else if (checkDraw()) {
                            handleDraw();
                        } else {
                            // העברת תור בהתאם למספר הקבוצות
                            currentPlayer++;
                            if (currentPlayer > totalTeams) currentPlayer = 1;
                            updateTurnIndicators();
                        }
                    }, 550);
                    
                    return; 
                }
            }
        }

        function animateTokenDrop(row, col, player) {
            const cell = document.getElementById(`cell-${row}-${col}`);
            const token = document.createElement('div');
            token.classList.add('token');
            if (player === 1) token.classList.add('red');
            else if (player === 2) token.classList.add('yellow');
            else if (player === 3) token.classList.add('green');
            cell.appendChild(token);
        }

        function updateTurnIndicators() {
            team1Indicator.className = 'turn-indicator ' + (currentPlayer === 1 ? 'active-red' : 'inactive');
            team2Indicator.className = 'turn-indicator ' + (currentPlayer === 2 ? 'active-yellow' : 'inactive');
            team3Indicator.className = 'turn-indicator ' + (currentPlayer === 3 ? 'active-green' : 'inactive');
        }

        function enableControls(enable) {
            const buttons = controls.getElementsByTagName('button');
            for (let btn of buttons) {
                btn.disabled = !enable;
                btn.style.opacity = enable ? "1" : "0.5";
                btn.style.cursor = enable ? "pointer" : "not-allowed";
            }
        }

        function checkWin(r, c) {
            const directions = [
                [[0, 1], [0, -1]], // אופקי
                [[1, 0], [-1, 0]], // אנכי
                [[1, 1], [-1, -1]], // אלכסון יורד
                [[1, -1], [-1, 1]]  // אלכסון עולה
            ];

            const player = boardArr[r][c];

            for (let dir of directions) {
                let count = 1;
                let winningCells = [[r, c]];

                for (let i = 0; i < 2; i++) {
                    let dr = dir[i][0];
                    let dc = dir[i][1];
                    let nr = r + dr;
                    let nc = c + dc;

                    while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && boardArr[nr][nc] === player) {
                        count++;
                        winningCells.push([nr, nc]);
                        nr += dr;
                        nc += dc;
                    }
                }

                // הבדיקה עכשיו משתמשת במשתנה הדינמי winCondition (4 או 3)
                if (count >= winCondition) {
                    highlightWinningCells(winningCells);
                    return true;
                }
            }
            return false;
        }

        function checkDraw() {
            for (let c = 0; c < COLS; c++) {
                if (boardArr[0][c] === 0) return false;
            }
            return true;
        }

        function highlightWinningCells(cells) {
            cells.forEach(coord => {
                const r = coord[0];
                const c = coord[1];
                document.getElementById(`cell-${r}-${c}`).classList.add('winning-cell');
            });
        }

        function handleWin() {
            gameActive = false;
            enableControls(false);
            
            let teamName = "";
            let color = "";
            
            if (currentPlayer === 1) { teamName = "קבוצה א' (אדום)"; color = "#d63031"; }
            else if (currentPlayer === 2) { teamName = "קבוצה ב' (צהוב)"; color = "#fbc531"; }
            else if (currentPlayer === 3) { teamName = "קבוצה ג' (ירוק)"; color = "#00b894"; }
            
            messageArea.innerText = `🎉 ניצחון ל${teamName}! 🎉`;
            messageArea.style.color = color;
        }

        function handleDraw() {
            gameActive = false;
            enableControls(false);
            messageArea.innerText = "תיקו! הלוח מלא.";
            messageArea.style.color = "#dfe6e9";
        }

        // הפעלה ראשונית
        initGame();
    </script>
</body>
</html>
